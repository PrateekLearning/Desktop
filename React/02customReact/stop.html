<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stopwatch</title>
</head>
<body>

  <h1 id="display">00:00:00</h1>

  <button id="start">Start</button>
  <button id="stop">Stop</button>
  <button id="reset">Reset</button>
  <button id="lapse">Lapses</button>

  <ul id="lapselist"></ul>

  <script>
    
    const startbtn = document.getElementById('start');
    const stopbtn = document.getElementById('stop');
    const resetbtn = document.getElementById('reset');
    const lapse = document.getElementById('lapse');


    const displaytime = document.getElementById('display');
    const lapselist = document.getElementById('lapselist');


    let time = 0;
    let setinterv= null;

    let lapsePrint = false;

    let stopp = false;


      function a () {
        let hour = Math.floor(time/3600);
        let minutes = Math.floor((time%3600)/60);
        let seconds = time % 60;

        const hh = hour < 10 ? '0' + hour : hour ;
        const mm = minutes < 10 ? '0' + minutes : minutes;
        const ss = seconds < 10 ? '0' + seconds : seconds ;

        return displaytime.textContent = `${hh}:${mm}:${ss}`
    }


    startbtn.addEventListener('click',()=>{    
        if (setinterv!==null)
    {return}
        setinterv= setInterval(() => {
            time++;
            a();          
        }, 1000);

    });

    stopbtn.addEventListener('click',()=>{
        clearInterval(setinterv)
        setinterv = null;
        stopp = true;
    })

    resetbtn.addEventListener('click',()=>{
      
      clearInterval(setinterv);
       time=0;
      setinterv = null;
      a();
          lapsePrint =true;
          

    })

    lapse.addEventListener('click',()=>{
      if(lapsePrint)return;

      
      let b = document.createElement('li')
      b.textContent= a();
      let c = lapselist.appendChild(b)
      console.log(c);
      if(stopp = true){
        c = lapselist.appendChild(b)

      }
    })
  </script>

</body>
</html>
